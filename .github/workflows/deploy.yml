name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main  # Change to master if your default branch is named master

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Publish to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: 'Cleanup' # This matches your project name seen in your screenshot
          directory: '.' # Keeps it at root. Change to 'public' or 'dist' if your HTML files are in a subfolder
